<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的计划</title>
<!-- 引入 Supabase 客户端库 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8f7f5;--fg:#1a1a1a;--muted:#888;--accent:#333;--border:#e8e8e8;--card:#fff;--r:10px;--green:#22c55e;--green-bg:#f0fdf4;--green-bd:#bbf7d0;--blue:#3b82f6;--blue-bg:#eff6ff;--purple:#8b5cf6;--purple-bg:#f5f3ff;--rose:#f43f5e;--rose-bg:#fff1f2;--orange:#f97316;--orange-bg:#fff7ed;--amber:#f59e0b;--amber-bg:#fffbeb}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--fg);line-height:1.6;min-height:100vh}
.C{max-width:920px;margin:0 auto;padding:16px 16px 72px}

.hdr{padding:16px 0 12px;margin-bottom:12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.hdr h1{font-size:1.25rem;font-weight:700}
.hdr-right{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--muted)}
.hdr-right .cd{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:6px 12px;font-weight:700;color:var(--accent)}
.streak{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--amber-bg);border:1px solid #fde68a;border-radius:100px;font-size:.72rem;color:#92400e;font-weight:600}

.sw{display:flex;margin-bottom:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.sw button{flex:1;padding:10px;border:none;background:transparent;font-size:.82rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
.sw button+button{border-left:1px solid var(--border)}
.sw button:hover{color:var(--fg);background:#fafafa}
.sw button.on{color:#fff;background:var(--accent);font-weight:600}
.sec{display:none}.sec.on{display:block}

.tabs{display:flex;margin-bottom:20px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.tabs button{flex:1;padding:9px 6px;border:none;background:transparent;font-size:.76rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
.tabs button+button{border-left:1px solid var(--border)}
.tabs button:hover{color:var(--fg)}
.tabs button.on{color:#fff;background:var(--accent);font-weight:600}
.tp{display:none}.tp.on{display:block}

.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 12px;text-align:center}
.card .v{font-size:1.25rem;font-weight:700}.card .l{font-size:.68rem;color:var(--muted)}
.card.ed{cursor:pointer}.card.ed:hover{border-color:#ccc}
.card.bl{border-left:3px solid var(--blue)}.card.gl{border-left:3px solid var(--green)}
.card.pl{border-left:3px solid var(--purple)}.card.rl{border-left:3px solid var(--rose)}

.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.64rem;font-weight:700}
.tag.blue{background:var(--blue-bg);color:#1d4ed8}.tag.green{background:var(--green-bg);color:#15803d}
.tag.purple{background:var(--purple-bg);color:#6d28d9}.tag.rose{background:var(--rose-bg);color:#be123c}
.tag.orange{background:var(--orange-bg);color:#c2410c}.tag.gray{background:#f3f4f6;color:var(--muted)}
.tag.ok{background:var(--green-bg);color:#15803d}.tag.no{background:#fee2e2;color:#dc2626}

.task{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;user-select:none}
.task:hover{border-color:#ccc}.task.ck{background:var(--green-bg);border-color:var(--green-bd)}
.ckbox{width:20px;height:20px;border:2px solid #d4d4d4;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:transparent;transition:all .15s}
.task.ck .ckbox{background:var(--green);border-color:var(--green);color:#fff}
.task .info{flex:1;min-width:0}.task .info .t{font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:5px}
.task .info .c{font-size:.72rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task .h{font-size:.72rem;color:var(--muted);flex-shrink:0;font-weight:500}

.st{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}

.pbar{height:5px;background:#f0f0f0;border-radius:3px;overflow:hidden;margin:6px 0}
.pfill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s}
.pdots{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.pdot{flex:1;min-width:55px;text-align:center;font-size:.6rem;padding:5px 3px;border-radius:5px;background:var(--card);border:1px solid var(--border);color:var(--muted);cursor:pointer;white-space:nowrap}
.pdot.on{background:var(--accent);color:#fff;border-color:var(--accent)}.pdot.dn{background:var(--green-bg);border-color:var(--green-bd);color:#166534}

.tbl{width:100%;border-collapse:collapse;font-size:.76rem;background:var(--card);border-radius:var(--r);overflow:hidden;border:1px solid var(--border)}
.tbl th{background:#f9fafb;padding:8px 6px;text-align:left;font-weight:600;font-size:.68rem;color:var(--muted);border-bottom:1px solid var(--border)}
.tbl td{padding:8px 6px;border-bottom:1px solid var(--border)}
.tbl tr:last-child td{border-bottom:none}

.inp{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:.8rem;font-family:inherit;background:var(--card)}
.inp:focus{outline:none;border-color:var(--accent)}
.btn{padding:7px 14px;border:none;border-radius:6px;font-size:.74rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-dark{background:var(--accent);color:#fff}.btn-dark:hover{opacity:.85}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{opacity:.85}
.btn-out{background:var(--card);color:var(--muted);border:1px solid var(--border)}.btn-out:hover{border-color:var(--accent);color:var(--fg)}
.btn-rose{background:transparent;color:var(--rose);border:1px solid var(--border);font-size:.66rem;padding:4px 8px}
.btn-sm{padding:4px 10px;font-size:.68rem}

.qbar{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.qbar .sep{width:1px;height:22px;background:var(--border)}
.qbar label{font-size:.72rem;font-weight:600;color:var(--muted);flex-shrink:0}

.wchart{display:flex;align-items:end;gap:3px;height:160px;padding:8px 2px 0;border-bottom:2px solid var(--border);margin-bottom:6px;overflow-x:auto}
.wbar{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:end;height:100%;gap:2px;cursor:pointer}
.wbar .bar{width:24px;border-radius:3px 3px 0 0;background:var(--blue);min-height:2px;transition:height .3s}
.wbar .val{font-size:.6rem;font-weight:700}.wbar .dt{font-size:.5rem;color:var(--muted);writing-mode:vertical-rl}

.warn{padding:8px 10px;margin-bottom:5px;background:var(--rose-bg);border:1px solid #fecdd3;border-radius:8px;font-size:.74rem}

.fcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px}
.fcard h3{font-size:.85rem;margin-bottom:8px}.fcard p{font-size:.74rem;color:var(--muted);margin-bottom:4px}

.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.calcell{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 3px;text-align:center;font-size:.68rem;cursor:pointer;transition:all .15s;min-height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.calcell:hover{border-color:#aaa;transform:scale(1.04)}.calcell.td{border-color:var(--accent);border-width:2px}
.calcell.dn{background:var(--green-bg);border-color:var(--green-bd)}
.calcell.past{background:#fefefe}.calcell.past:hover{background:#f5f5f5;border-color:var(--accent)}
.calcell .dn2{font-weight:700;font-size:.82rem}
.calcell .dots{display:flex;gap:3px;justify-content:center;margin-top:3px;flex-wrap:wrap}
.calcell .dot{width:7px;height:7px;border-radius:50%;background:#e0e0e0;transition:background .2s}
.calcell .dot.blue{background:var(--blue)}.calcell .dot.green{background:var(--green)}
.calcell .dot.purple{background:var(--purple)}.calcell .dot.rose{background:var(--rose)}
.calcell .dot.orange{background:var(--orange)}
.calcell .miss{font-size:.5rem;color:var(--rose);font-weight:700;margin-top:1px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:8px 20px;border-radius:8px;font-size:.78rem;font-weight:500;opacity:0;pointer-events:none;transition:opacity .3s;z-index:300}
.toast.show{opacity:1}

.fab{position:fixed;bottom:24px;right:24px;width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:1.2rem;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;z-index:90;transition:transform .15s}
.fab:hover{transform:scale(1.06)}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:12px;padding:20px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal h3{font-size:.95rem;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.modal .mclose{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted);padding:0 4px;line-height:1}
.modal .mclose:hover{color:var(--fg)}

.note-item{padding:10px 12px;margin-bottom:6px;background:#fafafa;border-radius:8px;font-size:.76rem;cursor:pointer;transition:all .15s;border:1px solid transparent}
.note-item:hover{border-color:var(--border);background:#f0f0f0}
.note-item .ndate{color:var(--muted);font-size:.7rem;font-weight:600}
.note-item .npreview{margin-top:3px;white-space:pre-wrap;word-break:break-all}

.legend{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0;font-size:.62rem;color:var(--muted);align-items:center}
.legend .ldot{display:inline-block;width:6px;height:6px;border-radius:50%;vertical-align:middle;margin-right:2px}

footer{margin-top:32px;padding-top:16px;border-top:1px solid var(--border);text-align:center;font-size:.7rem;color:var(--muted)}

@media(max-width:768px){.g4,.g3{grid-template-columns:repeat(2,1fr)}.tabs button{font-size:.68rem;padding:7px 4px}.qbar{flex-direction:column;align-items:stretch}.qbar .sep{display:none}.modal{max-width:95%;padding:16px}}
</style>
</head>
<body>
<div class="C">
    <div class="hdr">
        <div><h1 id="greeting">我的计划</h1></div>
        <div class="hdr-right">
            <span class="cd" id="countdown"></span>
            <span class="streak" id="streakBadge">&#x1F525;<span id="streakN">0</span>天</span>
        </div>
    </div>

    <div class="sw">
        <button class="on" data-sec="s-ky">考研计划</button>
        <button data-sec="s-fit">减脂计划</button>
    </div>

    <div class="sec on" id="s-ky">
        <div class="g4" id="kyTargets"></div>
        <div class="g4" id="kyStats"></div>
        <div class="tabs" id="kyTabs">
            <button class="on" data-tp="ky1">今日任务</button>
            <button data-tp="ky2">学习日历</button>
            <button data-tp="ky3">进度统计</button>
            <button data-tp="ky4">资料清单</button>
            <button data-tp="ky5">笔记总结</button>
        </div>
        <div class="tp on" id="ky1"></div>
        <div class="tp" id="ky2"></div>
        <div class="tp" id="ky3"></div>
        <div class="tp" id="ky4"></div>
        <div class="tp" id="ky5"></div>
    </div>

    <div class="sec" id="s-fit">
        <div class="g3" id="fitStats"></div>
        <div class="qbar" id="fitQbar">
            <label>体重</label><input class="inp" id="qW" type="number" step="0.1" placeholder="kg" style="width:72px;text-align:center;font-weight:700">
            <button class="btn btn-dark" data-act="qSaveW">记录</button>
            <div class="sep"></div>
            <label>饮食</label><input class="inp" id="qM" placeholder="早餐-xx / 午餐-xx / 晚餐-xx" style="flex:1;min-width:160px">
            <button class="btn btn-green" data-act="qSaveM">记录</button>

        <div class="tabs" id="fitTabs">
            <button class="on" data-tp="fit1">每日打卡</button>
            <button data-tp="fit2">打卡日历</button>
            <button data-tp="fit3">饮食记录</button>
            <button data-tp="fit4">体重趋势</button>
        </div>
        <div class="tp on" id="fit1"></div>
        <div class="tp" id="fit2"></div>
        <div class="tp" id="fit3"></div>
        <div class="tp" id="fit4"></div>
    </div>

    <div class="modal-overlay" id="modal"><div class="modal" id="modalBody"></div></div>
    <div class="toast" id="toast"></div>
    <button class="fab" data-act="quickCheckin">&#10003;</button>
    <footer>&#169; <span id="footY"></span> · 加油上岸 · 健康生活</footer>
</div>

<script>
(function(){
// ========== 云端数据库配置 ==========
const supabaseUrl = 'https://pxesqkbegwacnftjhxly.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4ZXNxa2JlZ3dhY25mdGpoeGx5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NTY4MDYsImV4cCI6MjA5NDIzMjgwNn0.TpoGGp-Em6-60iAPxA8aZTz2Fum9ygdWhA7bDYNq4GY';
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// 全局缓存，替代 localStorage
let CACHE = {};

// 初始化：从云端加载全部数据到缓存
async function initData() {
  const { data, error } = await supabase.from('app_data').select('*');
  if (data) {
    data.forEach(row => { CACHE[row.key] = row.value; });
  }
  renderAll();
}

// 读取数据 (替代原来的 localStorage.getItem)
function ld(k) {
  try {
    return CACHE[k] || {};
  } catch (e) {
    return {};
  }
}

// 保存数据 (替代原来的 localStorage.setItem)
function sv(k, v) {
  CACHE[k] = v;
  // 异步存到云端，不阻塞界面
  supabase.from('app_data').upsert({ key: k, value: v }).then(({ error }) => {
    if (error) console.error('保存失败:', error);
  });
}

// ========== 原有业务逻辑（不变） ==========
var D=new Date(),TODAY=D.getFullYear()+'-'+String(D.getMonth()+1).padStart(2,'0')+'-'+String(D.getDate()).padStart(2,'0'),EXAM='2027-12-25',PSTART='2026-06-01';
var S={curSec:'s-ky',curKy:'ky1',curFit:'fit1',kyMOff:0,fitMOff:0};

var SK='ky_ck2',NK='ky_note2',MK='ky_mat2',FK='fit_ck2',FMK='fit_meal2',WK='fit_wt2',FPK='fit_prof2',CK='ky_custom2';

function kyCk(){return ld(SK)}
function kySave(d){sv(SK,d)}
function kyIsDone(dt){var c=kyCk();return c[dt]&&c[dt].all}
function kyIsSub(dt,k){var c=kyCk();return c[dt]&&c[dt][k]}
function kyToggleSub(dt,k){var c=kyCk();if(!c[dt])c[dt]={};c[dt][k]=!c[dt][k];if(!c[dt][k])delete c[dt][k];var p=kyDayTasks(dt),all=p.length>0;p.forEach(function(t){if(!c[dt][t.k]){all=false}});if(all)c[dt].all=true;else delete c[dt].all;kySave(c);return c[dt][k]===true}
function kyToggleDay(dt){var c=kyCk();if(!c[dt])c[dt]={};var was=c[dt].all===true;c[dt].all=!was;['math','english','cs408','politics','contest'].forEach(function(k){if(c[dt].all)c[dt][k]=true;else delete c[dt][k]});kySave(c);return!was}
function kyDayTasks(dt){
    var p=[];for(var i=0;i<STUDY_DATA.dailyPlan.length;i++){var d=STUDY_DATA.dailyPlan[i];if(d.date===dt){
        if(d.math_h>0)p.push({k:'math',s:'数学二',c:'math',h:d.math_h,t:d.math_content});
        if(d.english_h>0)p.push({k:'english',s:'英语二',c:'english',h:d.english_h,t:d.english_content});
        if(d.cs408_h>0)p.push({k:'cs408',s:'408',c:'cs408',h:d.cs408_h,t:d.cs408_content});
        if(d.politics_h>0)p.push({k:'politics',s:'政治',c:'politics',h:d.politics_h,t:d.politics_content});
        if(d.contest_h>0)p.push({k:'contest',s:'竞赛',c:'contest',h:d.contest_h,t:d.contest_content});
        return p;
    }}return p;
}
function kyDaySum(dt){for(var i=0;i<STUDY_DATA.dailyPlan.length;i++){if(STUDY_DATA.dailyPlan[i].date===dt)return STUDY_DATA.dailyPlan[i]}return null}
function kyPhase(dt){for(var i=0;i<STUDY_DATA.phases.length;i++){var p=STUDY_DATA.phases[i];if(dt>=p.start&&dt<=p.end)return p}return null}
function kyStreak(){var s=0,d=new Date();while(true){var ds=localDate(d);if(kyIsDone(ds)){s++;d.setDate(d.getDate()-1)}else if(ds===TODAY){d.setDate(d.getDate()-1)}else break}return s}
function kyStats(){
    var c=kyCk(),allD=Object.keys(c).filter(function(k){return c[k].all}),done=allD.length,th=0;
    var sH={math:0,english:0,cs408:0,politics:0,contest:0},sD={math:0,english:0,cs408:0,politics:0,contest:0},sT={math:0,english:0,cs408:0,politics:0,contest:0};
    STUDY_DATA.dailyPlan.forEach(function(d){if(allD.indexOf(d.date)>=0)th+=d.total_h||0;
        ['math','english','cs408','politics','contest'].forEach(function(k){if(d[k+'_h']>0){sT[k]++;if(c[d.date]&&c[d.date][k])sD[k]++;if(allD.indexOf(d.date)>=0)sH[k]+=d[k+'_h']}});
    });var total=STUDY_DATA.dailyPlan.length,rate=total>0?Math.round(done/total*100):0;
    var remain=STUDY_DATA.dailyPlan.filter(function(d){return d.date>TODAY}).length;    return{done:done,th:Math.round(th),rate:rate,remain:remain,sH:sH,sD:sD,sT:sT}
}
function kyNote(dt){return ld(NK)[dt]||''}
function kyNoteSave(dt,v){var n=ld(NK);if(v)n[dt]=v;else delete n[dt];sv(NK,n)}
function kyMat(){return ld(MK)}
function kyMatGot(n){return kyMat()[n]===true}
function kyMatToggle(n){var m=kyMat();m[n]=!m[n];sv(MK,m);return m[n]}

function customTasks(dt){return ld(CK)[dt]||[]}
function customTasksAll(){return ld(CK)}
function customTaskAdd(dt,title){var c=ld(CK);if(!c[dt])c[dt]=[];c[dt].push({id:Date.now(),t:title,done:false});sv(CK,c)}
function customTaskToggle(dt,id){var c=ld(CK);if(!c[dt])return;var found=false;c[dt].forEach(function(t){if(t.id===id){t.done=!t.done;found=true}});if(found)sv(CK,c)}
function customTaskDel(dt,id){var c=ld(CK);if(!c[dt])return;c[dt]=c[dt].filter(function(t){return t.id!==id});if(c[dt].length===0)delete c[dt];sv(CK,c)}
function customTaskEdit(dt,id,title){var c=ld(CK);if(!c[dt])return;c[dt].forEach(function(t){if(t.id===id)t.t=title});sv(CK,c)}

var FIT_DEF={weight:'105kg',target:'75kg',height:'172cm'};
function fitProf(){var p=ld(FPK);return p&&p.weight?p:FIT_DEF}
function fitProfSave(p){sv(FPK,p)}
function fitCk(){return ld(FK)}
function fitIsCk(dt){var c=fitCk();return c[dt]&&c[dt].train===true}
function fitToggle(dt){var c=fitCk();if(!c[dt])c[dt]={};c[dt].train=!c[dt].train;sv(FK,c);return c[dt].train}
function fitWts(){var w=ld(WK),a=[];Object.keys(w).sort().forEach(function(k){a.push({date:k,kg:w[k]})});return a}
function fitWtSave(dt,kg){var w=ld(WK);w[dt]=kg;sv(WK,w)}
function fitWtDel(dt){var w=ld(WK);delete w[dt];sv(WK,w)}
function fitLatestWt(){var a=fitWts();return a.length>0?a[a.length-1].kg:parseFloat(fitProf().weight)}

function exportNotes(){
    var notes=ld(NK),lines=['=== 我的计划笔记导出 ===','导出时间: '+TODAY,''];
    var kyDays=Object.keys(notes).filter(function(k){return notes[k]&&k.indexOf('fit_')!==0}).sort();
    if(kyDays.length>0){lines.push('--- 考研学习笔记 ---');kyDays.forEach(function(d){lines.push('【'+d+'】');lines.push(notes[d]);lines.push('')})}
    var fitDays=Object.keys(notes).filter(function(k){return notes[k]&&k.indexOf('fit_')===0}).sort();
    if(fitDays.length>0){lines.push('--- 减脂计划备注 ---');fitDays.forEach(function(k){var dd=k.replace('fit_','');lines.push('【'+dd+'】');lines.push(notes[k]);lines.push('')})}
    var blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='我的计划笔记_'+TODAY+'.txt';a.click();URL.revokeObjectURL(a.href);
    toast('笔记已导出');
}

        txt.split(/[\/／]/).forEach(function(p){p=p.trim();if(!p)return;
            if(/早餐|早饭|早/.test(p)&&!bf)bf=p;else if(/午餐|午饭|中/.test(p)&&!lu)lu=p;else if(/晚餐|晚饭|晚/.test(p)&&!di)di=p;else if(/加餐|零食|水果/.test(p)&&!sn)sn=p;else if(!bf)bf=p;else if(!lu)lu=p;else if(!di)di=p;else sn+=(sn?' / ':'')+p;
        });fitMealSave(TODAY,{bf:bf,lunch:lu,dinner:di,snack:sn});qm.value='';toast('饮食已记录');renderAll();break;
    case 'editProf':
        var fp=fitProf(),cv=f==='weight'?fitLatestWt():fp.target.replace('kg','');
        var nv=prompt('修改'+(f==='weight'?'起始体重':'目标体重')+'（kg）',cv);if(nv===null)return;
        var n2=parseFloat(nv);if(isNaN(n2)||n2<40||n2>200){toast('请输入有效数值');return}
        if(f==='weight'){fp.weight=n2+'kg';fp.bmi=(n2/(1.72*1.72)).toFixed(1)}else fp.target=n2+'kg';
        fitProfSave(fp);toast('已更新');renderAll();break;
    case 'goFitDaily':
        document.querySelectorAll('#fitTabs button').forEach(function(b){b.classList.remove('on')});
        document.querySelector('#fitTabs [data-tp="fit1"]').classList.add('on');
        document.querySelectorAll('#s-fit .tp').forEach(function(p){p.classList.remove('on')});
        document.getElementById('fit1').classList.add('on');S.curFit='fit1';renderAll();break;
    case 'quickCheckin':
        if(S.curSec==='s-ky'){
            document.querySelectorAll('#kyTabs button').forEach(function(b){b.classList.remove('on')});
            document.querySelector('#kyTabs [data-tp="ky1"]').classList.add('on');
            document.querySelectorAll('#s-ky .tp').forEach(function(p){p.classList.remove('on')});
            document.getElementById('ky1').classList.add('on');S.curKy='ky1';
            if(TODAY<PSTART){
                var cct=customTasks(TODAY);if(cct.length===0){toast('请先添加自定义任务');return}
                if(cct.every(function(t){return t.done})){toast('今天自定义任务已全部完成！');return}
                cct.forEach(function(t){if(!t.done)customTaskToggle(TODAY,t.id)});toast('自定义任务全部完成！');renderAll();
            }else{
                var pp=kyDayTasks(TODAY);
                if(!pp.length){toast('今天无学习任务');return}
                if(pp.every(function(t){return kyIsSub(TODAY,t.k)})){toast('今天已全部签到！');return}
                var cc=kyCk();if(!cc[TODAY])cc[TODAY]={};pp.forEach(function(t){cc[TODAY][t.k]=true});cc[TODAY].all=true;kySave(cc);toast('全部签到完成！');renderAll();
            }
        }else{
            var tw3=WD[D.getDay()],tt3=null;FIT_TRAIN.forEach(function(r){if(r.day===tw3)tt3=r});
            if(!tt3||tt3.type==='休息'||tt3.type==='休息/散步'){toast('今天休息日，去记录饮食吧~');return}
            if(fitIsCk(TODAY)){toast('今天已签到！');return}
            fitToggle(TODAY);toast('运动签到完成！');renderAll();
        }break;

    case 'closeModal':hideModal();break;
    case 'viewNote':showNoteModal(d,kyNote(d));break;
    case 'viewFitNote':showNoteModal(d,kyNote('fit_'+d));break;
    case 'exportNotes':exportNotes();break;
    case 'editNote':
        var nts=ld(NK),oldV=nts[k]||'';
        var nv=prompt('编辑笔记 ('+k.replace('fit_','')+')',oldV);
        if(nv===null)return;
        if(nv.trim()){nts[k]=nv.trim()}else{delete nts[k]}
        sv(NK,nts);toast(nv.trim()?'笔记已更新':'笔记已删除');renderNoteSummary();break;
    case 'delNote':
        var nts2=ld(NK);delete nts2[k];sv(NK,nts2);toast('笔记已删除');renderNoteSummary();break;
    case 'noteFilter':
        var nts3=ld(NK),nl=document.getElementById('noteList');if(!nl)return;
        var kyD=Object.keys(nts3).filter(function(kk){return nts3[kk]&&kk.indexOf('fit_')!==0}).sort().reverse();
        var fitD=Object.keys(nts3).filter(function(kk){return nts3[kk]&&kk.indexOf('fit_')===0}).sort().reverse();
        var items=[];
        if(k==='ky'){kyD.forEach(function(d){items.push({date:d,key:d,type:'ky',content:nts3[d]})})}
        else if(k==='fit'){fitD.forEach(function(kk){items.push({date:kk.replace('fit_',''),key:kk,type:'fit',content:nts3[kk]})})}
        else{kyD.forEach(function(d){items.push({date:d,key:d,type:'ky',content:nts3[d]})});fitD.forEach(function(kk){items.push({date:kk.replace('fit_',''),key:kk,type:'fit',content:nts3[kk]})});items.sort(function(a,b){return b.date.localeCompare(a.date)})}
        var fh='';
        if(items.length===0){fh='<div style="text-align:center;padding:24px;color:var(--muted)">暂无笔记</div>'}
        else{items.forEach(function(item){
            var tag2=item.type==='ky'?'<span class="tag purple">考研</span>':'<span class="tag orange">减脂</span>';
            fh+='<div class="fcard" style="margin-bottom:10px;padding:12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div style="display:flex;align-items:center;gap:6px"><strong style="font-size:.82rem">'+item.date+'</strong>'+tag2+'</div><div style="display:flex;gap:4px"><button class="btn btn-out btn-sm" data-act="editNote" data-k="'+item.key+'">编辑</button><button class="btn btn-rose btn-sm" data-act="delNote" data-k="'+item.key+'">删除</button></div></div>';
            fh+='<div style="font-size:.78rem;white-space:pre-wrap;line-height:1.7;padding:8px;background:#fafafa;border-radius:6px">'+escHtml(item.content)+'</div></div>';
        })}
        nl.innerHTML=fh;
        document.querySelectorAll('[data-act="noteFilter"]').forEach(function(b){b.className='btn btn-sm btn-out'});
        e.target.closest('[data-act="noteFilter"]').className='btn btn-sm btn-dark';
        break;

    case 'fitBuqian':if(d>TODAY){toast('不能提前签到');return}showFitBuqian(d);break;
    case 'fitGoToday':
        document.querySelectorAll('#fitTabs button').forEach(function(b){b.classList.remove('on')});
        document.querySelector('#fitTabs [data-tp="fit1"]').classList.add('on');
        document.querySelectorAll('#s-fit .tp').forEach(function(p){p.classList.remove('on')});
        document.getElementById('fit1').classList.add('on');S.curFit='fit1';renderAll();break;
    case 'bqFitTrain':fitToggle(d);toast(fitIsCk(d)?'训练签到完成':'取消训练签到');showFitBuqian(d);if(S.curFit==='fit2')renderFitCal();break;
    case 'bqFitW':
        var bw=document.getElementById('bqW');if(!bw)return;var bvv=parseFloat(bw.value);
        if(isNaN(bvv)||bvv<50||bvv>150){toast('请输入有效体重');return}
        fitWtSave(d,Math.round(bvv*10)/10);toast('体重已记录');showFitBuqian(d);if(S.curFit==='fit2')renderFitCal();break;
    case 'bqFitWDel':fitWtDel(d);toast('已删除体重');showFitBuqian(d);if(S.curFit==='fit2')renderFitCal();break;
    case 'bqFitMeal':
        var bbf=document.getElementById('bqm_bf');if(!bbf)return;
        fitMealSave(d,{bf:bbf.value,lunch:document.getElementById('bqm_lunch').value,dinner:document.getElementById('bqm_dinner').value,snack:document.getElementById('bqm_snack').value});
        toast('饮食已保存');showFitBuqian(d);if(S.curFit==='fit2')renderFitCal();break;

    case 'fitMPrev':S.fitMOff--;renderFitCal();break;
    case 'fitMNext':S.fitMOff++;renderFitCal();break;
    }
});

document.getElementById('modal').addEventListener('click',function(e){
    if(e.target===this)hideModal();
});

function setupTabs(navId,secId,curKey,cb){
    document.querySelectorAll('#'+navId+' button').forEach(function(btn){
        btn.addEventListener('click',function(){
            document.querySelectorAll('#'+navId+' button').forEach(function(b){b.classList.remove('on')});
            document.querySelectorAll('#'+secId+' .tp').forEach(function(p){p.classList.remove('on')});
            btn.classList.add('on');var tp=btn.getAttribute('data-tp');
            document.getElementById(tp).classList.add('on');
            S[curKey]=tp;cb();
        });
    });
}
setupTabs('kyTabs','s-ky','curKy',renderAll);
setupTabs('fitTabs','s-fit','curFit',renderAll);

document.querySelectorAll('.sw button').forEach(function(btn){
    btn.addEventListener('click',function(){
        document.querySelectorAll('.sw button').forEach(function(b){b.classList.remove('on')});
        document.querySelectorAll('.sec').forEach(function(){.classList.remove('on')});
        btn.classList.add('on');var sid=btn.getAttribute('data-sec');
        document.getElementById(sid).classList.add('on');S.curSec=sid;renderAll();
    });
});

document.getElementById('footY').textContent=D.getFullYear();

// 改为从云端拉取数据后再渲染
initData();

document.addEventListener('focusout',function(e){
    var id=e.target.id;
    if(id==='kyNote'){kyNoteSave(TODAY,e.target.value)}
    if(id==='dN'){kyNoteSave('fit_'+TODAY,e.target.value)}
});
document.addEventListener('keydown',function(e){
    if((e.ctrlKey||e.metaKey)&&e.key==='s'){
        e.preventDefault();
        var kyN=document.getElementById('kyNote'),dN2=document.getElementById('dN');
        if(kyN&&document.activeElement===kyN){kyNoteSave(TODAY,kyN.value);toast('笔记已保存')}
        if(dN2&&document.activeElement===dN2){kyNoteSave('fit_'+TODAY,dN2.value);toast('备注已保存')}
    }
});
})();
</script>
